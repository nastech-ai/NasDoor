name: "💡 Feature Request"
description: Suggest a new feature or improvement
labels: ["type: feature", "status: triage"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Which area?
      options:
        - scope: android
        - scope: ios
        - scope: daemon
        - scope: app
        - scope: ci
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      placeholder: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
