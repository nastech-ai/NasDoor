# PR auto-labeler — all 20 categories
# Used by: actions/labeler@v5

# ── TYPE ──────────────────────────────────────────────────────
"type: docs":
  - changed-files:
      - any-glob-to-any-file: ["**/*.md", "CHANGELOG*", "docs/**"]

"type: chore":
  - changed-files:
      - any-glob-to-any-file:
          - ".eslintrc*"
          - ".prettierrc*"
          - "commitlint.config.js"
          - "tsconfig*.json"
          - ".editorconfig"
          - "*.config.js"
          - "*.config.ts"

"type: security":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - "**/permissions/**"
          - "nastech-agent/**/*.py"

"type: performance":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/nastech-app/sources/**"
          - "nastech-agent/**"

# ── SCOPE ─────────────────────────────────────────────────────
"scope: android":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/nastech-app/plugins/**"
          - "packages/nastech-app/eas-build-pre-install.sh"
          - "packages/nastech-app/android/**"

"scope: ios":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/nastech-app/sources/(app)/server.tsx"
          - "packages/nastech-app/ios/**"

"scope: daemon":
  - changed-files:
      - any-glob-to-any-file: ["nastech-agent/**"]

"scope: app":
  - changed-files:
      - any-glob-to-any-file: ["packages/nastech-app/sources/**"]

"scope: ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/dependabot.yml"
          - "renovate.json"
          - "eas.json"
          - "packages/nastech-app/eas.json"

"scope: deps":
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "pnpm-lock.yaml"
          - "packages/nastech-app/package.json"
          - "renovate.json"
          - "nastech-agent/requirements*.txt"
          - "nastech-agent/pyproject.toml"

# ── PRIORITY (title keywords — handled via issue-triage bot) ──
# PR priority labels are set manually via slash commands

# ── STATUS ────────────────────────────────────────────────────
"status: review":
  - head-branch: ["^(feat|fix|perf|docs|chore|refactor)/.*"]

"status: triage":
  - head-branch: ["^(wip|draft|exp)/.*"]

# ── LEGACY COMPAT (kept for backward compat) ──────────────────
"type: deps":
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "packages/nastech-app/package.json"
          - "renovate.json"
          - "nastech-agent/requirements*.txt"
