# Pulled from: https://github.com/probot/probot/blob/master/.github/workflows/test.yml
name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install deps
        run: |
          export PATH="$HOME/.npm-global/bin:$PATH"
          npm install -g pnpm@10.11.0 --registry https://registry.npmjs.org/
          pnpm install --no-frozen-lockfile --registry https://registry.npmjs.org/
        working-directory: .
      - name: Check licenses
        run: |
          npx license-checker --production --summary \
            --onlyAllow="0BSD;Apache-2.0;Apache 2.0;BSD-2-Clause;BSD-3-Clause;ISC;MIT;Python-2.0;Unlicense;CC0-1.0" || true
        working-directory: packages/nastech-app
