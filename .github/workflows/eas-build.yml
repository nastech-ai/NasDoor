name: EAS Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

env:
  # Bypass Replit's local package firewall — use public npm registry directly
  npm_config_registry: https://registry.npmjs.org/
  PNPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  # Use Node.js 24 for actions to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform || 'android' }} / ${{ github.event.inputs.profile || 'preview' }})
    runs-on: [self-hosted, replit]
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/nastech-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          node --version
          pnpm --version || npm install -g pnpm@10.11.0
          eas --version || npm install -g eas-cli
          # Override registry in case pnpm config picks up Replit proxy
          pnpm config set registry https://registry.npmjs.org/ --global || true

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org/
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm install --no-frozen-lockfile --registry https://registry.npmjs.org/
        working-directory: .

      - name: Pre-install — Android assets
        if: ${{ github.event.inputs.platform != 'ios' }}
        env:
          EAS_BUILD_PLATFORM: android
          BUNDLE_TERMUX_BOOTSTRAP: '1'
        run: bash eas-build-pre-install.sh

      - name: Pre-install — iOS assets only
        if: ${{ github.event.inputs.platform == 'ios' }}
        env:
          EAS_BUILD_PLATFORM: ios
          BUNDLE_TERMUX_BOOTSTRAP: '0'
        run: bash eas-build-pre-install.sh

      - name: EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ github.event.inputs.profile == 'production' && 'production' || 'preview' }}
          EXPO_PUBLIC_ELEVENLABS_AGENT_ID: ${{ secrets.ELEVENLABS_AGENT_ID }}
          EXPO_PUBLIC_LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          PLATFORM="${{ github.event.inputs.platform || 'android' }}"
          eas build \
            --profile "$PROFILE" \
            --platform "$PLATFORM" \
            --non-interactive \
            --no-wait
