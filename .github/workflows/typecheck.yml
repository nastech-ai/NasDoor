name: TypeScript Typecheck

on:
  push:
    branches: [main]
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
      - '.github/workflows/typecheck.yml'
  pull_request:
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'

jobs:
  typecheck:
    name: TypeScript — nastech-app
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm --filter nastech-app typecheck
