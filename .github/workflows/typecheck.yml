name: TypeScript Typecheck

# SHIFT 2 — triggered when Super Linter (Shift 1) completes
on:
  push:
    branches: [main]
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
      - '.github/workflows/typecheck.yml'
  pull_request:
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
  workflow_run:
    workflows: ["Super Linter"]
    types: [completed]
    branches: [main]

jobs:
  typecheck:
    name: TypeScript — nastech-app
    runs-on: [self-hosted, replit]
    timeout-minutes: 15
    env:
      npm_config_registry: https://registry.npmjs.org/

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          node --version
          pnpm --version || npm install -g pnpm@10.11.0 --registry https://registry.npmjs.org/
          echo "registry=https://registry.npmjs.org/" > "$HOME/.npmrc"
        working-directory: .

      - name: Install dependencies
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm install --no-frozen-lockfile --registry https://registry.npmjs.org/
        working-directory: .

      - name: TypeScript typecheck
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm --filter nastech-app typecheck
        working-directory: .
