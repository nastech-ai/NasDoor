name: TypeScript Typecheck

on:
  push:
    branches: [main]
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
      - '.github/workflows/typecheck.yml'
  pull_request:
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'

jobs:
  typecheck:
    name: TypeScript — nastech-app
    runs-on: [self-hosted, replit]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          node --version
          pnpm --version || npm install -g pnpm@10.11.0

      - name: Install dependencies
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm install --no-frozen-lockfile

      - name: TypeScript typecheck
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm --filter nastech-app typecheck
