name: TypeScript Typecheck

on:
  push:
    branches: [main]
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
      - '.github/workflows/typecheck.yml'
  pull_request:
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
  workflow_run:
    workflows: ["Super Linter"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@10 --registry https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --registry https://registry.npmjs.org/
        continue-on-error: true

      - name: TypeScript typecheck
        run: pnpm --filter nastech-app exec tsc --noEmit 2>&1 | tail -30 || true
        continue-on-error: true
