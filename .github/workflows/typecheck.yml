name: TypeScript Typecheck

on:
  push:
    branches: [main]
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'
      - '.github/workflows/typecheck.yml'
  pull_request:
    paths:
      - 'packages/nastech-app/sources/**'
      - 'packages/nastech-app/tsconfig*.json'

env:
  npm_config_registry: https://registry.npmjs.org/
  PNPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: TypeScript — nastech-app
    runs-on: [self-hosted, replit]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          node --version
          pnpm --version || npm install -g pnpm@10.11.0
          pnpm config set registry https://registry.npmjs.org/ --global || true

      - name: Install dependencies
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm install --no-frozen-lockfile --registry https://registry.npmjs.org/

      - name: TypeScript typecheck
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm --filter nastech-app typecheck
