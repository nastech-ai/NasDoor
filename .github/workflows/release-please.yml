# Pulled from: https://github.com/googleapis/release-please-action
# SHIFT 4 — triggered when Agent Smoke Test (Shift 3) completes on main
name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["Agent Smoke Test"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please-pr:
    name: Release Please
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  tag-versions:
    name: Tag major/minor versions
    runs-on: ubuntu-latest
    needs: release-please-pr
    if: ${{ needs.release-please-pr.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Tag major and minor versions
        run: |
          git tag -d v${{ needs.release-please-pr.outputs.major }} || true
          git tag -d v${{ needs.release-please-pr.outputs.major }}.${{ needs.release-please-pr.outputs.minor }} || true
          git push origin :v${{ needs.release-please-pr.outputs.major }} || true
          git push origin :v${{ needs.release-please-pr.outputs.major }}.${{ needs.release-please-pr.outputs.minor }} || true
          git tag -a v${{ needs.release-please-pr.outputs.major }} -m "Release v${{ needs.release-please-pr.outputs.major }}"
          git tag -a v${{ needs.release-please-pr.outputs.major }}.${{ needs.release-please-pr.outputs.minor }} -m "Release v${{ needs.release-please-pr.outputs.major }}.${{ needs.release-please-pr.outputs.minor }}"
          git push origin v${{ needs.release-please-pr.outputs.major }}
          git push origin v${{ needs.release-please-pr.outputs.major }}.${{ needs.release-please-pr.outputs.minor }}

  eas-production-build:
    name: Trigger EAS production build
    runs-on: ubuntu-latest
    needs: release-please-pr
    if: ${{ needs.release-please-pr.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup EAS
        run: npm install -g eas-cli --registry https://registry.npmjs.org/

      - name: Build production APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --profile production --platform android --non-interactive --no-wait
        working-directory: packages/nastech-app
