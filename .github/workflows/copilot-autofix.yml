name: "🤖 Copilot: Auto-Fix"

on:
  workflow_run:
    workflows:
      - "🤖 Copilot: Code Quality"
      - "🤖 Copilot: Security"
      - "🤖 Copilot: Android"
      - "🤖 Copilot: iOS"
      - "Copilot Daemon"
      - "🤖 Copilot: CI"
      - "🤖 Copilot: Release"
      - "Super Linter"
      - "TypeScript Typecheck"
      - "Semantic Release"
      - "EAS Build"
    types: [completed]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      task:
        description: "Describe what to fix"
        required: false
        default: "Fix all failing CI checks"

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  check-failure:
    name: "Check if fix needed"
    runs-on: ubuntu-latest
    outputs:
      should_fix: ${{ steps.gate.outputs.should_fix }}
      failed_workflow: ${{ steps.gate.outputs.failed_workflow }}
      task: ${{ steps.gate.outputs.task }}
    steps:
      - name: Determine if auto-fix should run
        id: gate
        uses: actions/github-script@v9
        with:
          script: |
            const ev = context.eventName;

            if (ev === 'workflow_run') {
              const wfr = context.payload.workflow_run;
              if (wfr.conclusion === 'failure') {
                core.setOutput('should_fix', 'true');
                core.setOutput('failed_workflow', wfr.name);
                core.setOutput('task', `Fix failure in: ${wfr.name} (run ${wfr.id})`);
                console.log(`Failure in "${wfr.name}" — triggering auto-fix`);
              } else {
                core.setOutput('should_fix', 'false');
                console.log(`"${wfr.name}" passed — no fix needed`);
              }
              return;
            }

            if (ev === 'issue_comment') {
              const body = context.payload.comment?.body?.trim() || '';
              const assoc = context.payload.comment?.author_association || '';
              const allowed = ['OWNER','MEMBER','COLLABORATOR'].includes(assoc);
              if (allowed && (body.startsWith('/fix') || body.startsWith('/openhands'))) {
                const task = body.replace(/^\/(fix|openhands)\s*/, '') || 'Fix all CI errors';
                core.setOutput('should_fix', 'true');
                core.setOutput('task', task);
                core.setOutput('failed_workflow', 'manual');
              } else {
                core.setOutput('should_fix', 'false');
              }
              return;
            }

            core.setOutput('should_fix', 'true');
            core.setOutput('task', context.payload.inputs?.task || 'Fix all CI errors');
            core.setOutput('failed_workflow', 'manual dispatch');

  quick-fixes:
    name: "Quick auto-fixes"
    needs: check-failure
    if: needs.check-failure.outputs.should_fix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with: { node-version: "20" }

      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: Install tools
        run: |
          npm install -g prettier 2>/dev/null | tail -3 || true
          pip install autopep8 isort -q

      - name: Fix — Prettier (TypeScript)
        run: |
          find packages/nastech-app/sources -name "*.ts" -o -name "*.tsx" 2>/dev/null | \
            xargs prettier --write 2>/dev/null || true
          echo "Prettier done"

      - name: Fix — autopep8 (Python)
        run: |
          find nastech-agent -name "*.py" 2>/dev/null | \
            xargs autopep8 --in-place --aggressive 2>/dev/null || true
          echo "autopep8 done"

      - name: Fix — isort (Python imports)
        run: |
          isort nastech-agent/ --profile black 2>/dev/null || true
          echo "isort done"

      - name: Fix — YAML trailing whitespace
        run: |
          python3 - << 'PYEOF'
          import glob, re
          for f in glob.glob('.github/workflows/*.yml'):
              content = open(f).read()
              fixed = re.sub(r'[ \t]+$', '', content, flags=re.MULTILINE)
              if not fixed.endswith('\n'):
                  fixed += '\n'
              if fixed != content:
                  open(f, 'w').write(fixed)
                  print(f"fixed: {f.split('/')[-1]}")
          print("YAML trailing-space fix done")
          PYEOF

      - name: Commit all quick fixes
        run: |
          git config user.name  "NasDoor Copilot[bot]"
          git config user.email "copilot@nasdoor.bot"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            CHANGES=$(git diff --cached --stat | tail -1)
            git commit -m "fix(copilot): auto-fix CI issues [skip ci]"
            git push origin HEAD
            echo "Auto-fixes committed and pushed"
          fi

  openhands-fix:
    name: "OpenHands AI fix"
    needs: [check-failure, quick-fixes]
    if: needs.check-failure.outputs.should_fix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Run OpenHands resolver
        if: env.LLM_API_KEY != ''
        uses: all-hands-ai/OpenHands-resolver@main
        continue-on-error: true
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          llm-model: "anthropic/claude-3-5-sonnet-20241022"
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          max-iterations: "20"

      - name: Report result
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const workflow = '${{ needs.check-failure.outputs.failed_workflow }}';
            const task     = '${{ needs.check-failure.outputs.task }}';
            if (['manual dispatch','manual',''].includes(workflow)) return;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'scope: ci', state: 'open', per_page: 10,
            });
            const dup = existing.data.some(i => i.title.includes(workflow));
            if (!dup) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[Copilot Auto-Fix] Failure in "${workflow}"`,
                body: [
                  `## Auto-Fix Report`,
                  `**Failed workflow:** \`${workflow}\``,
                  `**Task:** ${task}`,
                  ``,
                  `Quick fixes (Prettier, autopep8, isort, YAML) applied.`,
                  `Comment \`/fix <description>\` to trigger OpenHands AI repair.`,
                ].join('\n'),
                labels: ['type: bug', 'scope: ci', 'priority: high', 'status: triage'],
              });
            }
