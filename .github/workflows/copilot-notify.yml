name: "🤖 Copilot: Notify"

on:
  workflow_run:
    workflows:
      - "🤖 Copilot: Code Quality"
      - "🤖 Copilot: Security"
      - "🤖 Copilot: Android"
      - "🤖 Copilot: iOS"
      - "Copilot Daemon"
      - "🤖 Copilot: CI"
      - "🤖 Copilot: Release"
      - "EAS Build"
      - "Super Linter"
      - "TypeScript Typecheck"
      - "release-please"
      - "Semantic Release"
      - "CodeQL"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  notify:
    name: "Notify on failure"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Collect failure details
        id: details
        uses: actions/github-script@v7
        with:
          script: |
            let wfName, wfUrl, conclusion, jobs_summary;

            if (context.eventName === 'workflow_run') {
              const wfr  = context.payload.workflow_run;
              wfName     = wfr.name;
              wfUrl      = wfr.html_url;
              conclusion = wfr.conclusion;

              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                run_id: wfr.id,
              });
              const failing = jobs.data.jobs.filter(j => j.conclusion === 'failure');
              jobs_summary  = failing.map(j => {
                const steps = j.steps.filter(s => s.conclusion === 'failure').map(s => s.name);
                return `- **${j.name}**: ${steps.join(', ') || 'unknown step'}`;
              }).join('\n');
            } else {
              wfName       = 'Manual dispatch';
              wfUrl        = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions`;
              conclusion   = 'triggered';
              jobs_summary = '(Manual notification triggered)';
            }

            core.setOutput('wf_name',    wfName    || 'unknown');
            core.setOutput('wf_url',     wfUrl     || '');
            core.setOutput('conclusion', conclusion || 'unknown');
            core.setOutput('jobs',       jobs_summary || 'No details');

      - name: Push to ntfy.sh
        env:
          WF_NAME:    ${{ steps.details.outputs.wf_name }}
          WF_URL:     ${{ steps.details.outputs.wf_url }}
          CONCLUSION: ${{ steps.details.outputs.conclusion }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          TOPIC="${NTFY_TOPIC:-nasdoor-ci}"
          curl -s --max-time 10 \
            -H "Title: NasDoor CI ${WF_NAME}" \
            -H "Priority: high" \
            -H "Tags: robot,rotating_light" \
            --data-urlencode "Workflow: ${WF_NAME} — ${CONCLUSION}" \
            "https://ntfy.sh/${TOPIC}" 2>/dev/null || \
            echo "ntfy.sh skipped (set NTFY_TOPIC secret to enable)"

      - name: Create GitHub issue
        uses: actions/github-script@v7
        with:
          script: |
            const wfName = '${{ steps.details.outputs.wf_name }}';
            const wfUrl  = '${{ steps.details.outputs.wf_url }}';
            const jobs   = '${{ steps.details.outputs.jobs }}';
            const sha    = (context.sha || 'unknown').slice(0, 7);

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'scope: ci', state: 'open', per_page: 20,
            });
            const dup = existing.data.find(i =>
              i.title.includes(wfName) && i.title.includes('Notify')
            );

            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `Repeat failure on \`${sha}\`\n\n${jobs}\n\n[View run](${wfUrl})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[Copilot Notify] ${wfName} failed on ${sha}`,
                body: [
                  `## Copilot Notification`,
                  `| Field | Value |`,
                  `|---|---|`,
                  `| Workflow | \`${wfName}\` |`,
                  `| Commit | \`${sha}\` |`,
                  `| Result | failure |`,
                  `| Run | [View logs](${wfUrl}) |`,
                  ``,
                  `### Failing jobs`,
                  jobs,
                  ``,
                  `Comment \`/fix\` to trigger OpenHands auto-repair.`,
                ].join('\n'),
                labels: ['type: bug', 'scope: ci', 'status: triage', 'priority: high'],
              });
            }
