name: "📱 Telegram Notify"

on:
  workflow_run:
    workflows:
      - "EAS Build"
      - "🤖 Copilot: Code Quality"
      - "🤖 Copilot: Security"
      - "🤖 Copilot: Android"
      - "🤖 Copilot: iOS"
      - "🤖 Copilot: Daemon"
      - "🤖 Copilot: CI"
      - "🤖 Copilot: Release"
      - "🤖 Copilot: Auto-Fix"
      - "🙌 OpenHands Bot"
      - "Super Linter"
      - "TypeScript Typecheck"
      - "release-please"
      - "Semantic Release"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  notify:
    name: "Send Telegram message"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          WF_NAME:    ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL:    ${{ github.event.workflow_run.html_url }}
          HEAD_SHA:   ${{ github.event.workflow_run.head_sha }}
          REPO:       ${{ github.repository }}
          EVENT:      ${{ github.event_name }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error

          token   = os.environ.get('BOT_TOKEN', '')
          chat_id = os.environ.get('CHAT_ID', '')
          if not token or not chat_id:
              print("TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping")
              raise SystemExit(0)

          wf_name    = os.environ.get('WF_NAME', '') or 'NasDoor CI'
          conclusion = os.environ.get('CONCLUSION', '') or 'triggered'
          run_url    = os.environ.get('RUN_URL', '')
          head_sha   = (os.environ.get('HEAD_SHA', '') or '')[:7] or 'unknown'
          repo       = os.environ.get('REPO', 'nastech-ai/NasDoor')
          event      = os.environ.get('EVENT', '')

          # Only send on failure or manual dispatch
          if conclusion not in ('failure', '') and event != 'workflow_dispatch':
              print(f"Conclusion is '{conclusion}' — not a failure, skipping")
              raise SystemExit(0)

          icons = {'success': '✅', 'failure': '❌', 'cancelled': '⚪', 'skipped': '⏭'}
          icon  = icons.get(conclusion, '🔔')
          word  = {'failure': 'FAILED', 'success': 'passed',
                   'cancelled': 'cancelled'}.get(conclusion, conclusion or 'triggered')

          lines = [
              f"{icon} *{wf_name}* {word}",
              f"Repo: `{repo}`",
              f"Commit: `{head_sha}`",
          ]
          if run_url:
              lines.append(f"[View logs]({run_url})")

          text = "\n".join(lines)

          payload = json.dumps({
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "Markdown",
              "disable_web_page_preview": True,
          }).encode()

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.loads(resp.read())
                  print("Sent OK" if data.get('ok') else f"API error: {data}")
          except Exception as e:
              print(f"Send failed: {e}")
              raise SystemExit(1)
          PYEOF
