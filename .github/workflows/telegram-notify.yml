# Telegram Notification Workflow — sends CI results to Telegram
# Complements the always-on bot with instant GitHub Actions push notifications
name: "📱 Telegram Notify"

on:
  workflow_run:
    workflows:
      - "EAS Build"
      - "🤖 Copilot: Code Quality"
      - "🤖 Copilot: Security"
      - "🤖 Copilot: Android"
      - "🤖 Copilot: iOS"
      - "🤖 Copilot: Daemon"
      - "🤖 Copilot: CI"
      - "🤖 Copilot: Release"
      - "🤖 Copilot: Auto-Fix"
      - "🙌 OpenHands Bot"
      - "Super Linter"
      - "release-please"
      - "Semantic Release"
      - "TypeScript — nastech-app"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  notify:
    name: "Send Telegram message"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build and send message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "⚠️  TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping"
            exit 0
          fi

          WF_NAME="${{ github.event.workflow_run.name }}"
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          REPO="${{ github.repository }}"

          if [ "$CONCLUSION" = "success" ]; then
            ICON="✅"; WORD="passed"
          elif [ "$CONCLUSION" = "failure" ]; then
            ICON="❌"; WORD="FAILED"
          elif [ "$CONCLUSION" = "cancelled" ]; then
            ICON="⚪"; WORD="cancelled"
          else
            ICON="⏭"; WORD="$CONCLUSION"
          fi

          MSG="${ICON} *${WF_NAME}* ${WORD}
Repo: \`${REPO}\`
Commit: \`${SHORT_SHA}\`
[View logs](${RUN_URL})"

          # Only send for failures + manual dispatches (avoid spam on success)
          if [ "$CONCLUSION" = "failure" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${CHAT_ID}\",
                \"text\": \"${MSG}\",
                \"parse_mode\": \"Markdown\",
                \"disable_web_page_preview\": true
              }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Sent' if d.get('ok') else f'❌ {d}')"
          else
            echo "ℹ️  Not a failure — skipping notification"
          fi
