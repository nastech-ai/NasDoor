name: EAS OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS update channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      message:
        description: 'Update message (optional)'
        required: false
        default: ''

jobs:
  ota:
    name: OTA → ${{ github.event.inputs.channel || 'preview' }}
    runs-on: [self-hosted, replit]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/nastech-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup tools
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          node --version
          pnpm --version || npm install -g pnpm@10.11.0
          eas --version || npm install -g eas-cli

      - name: Install dependencies
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          pnpm install --no-frozen-lockfile
        working-directory: .

      - name: Pre-install (image assets only)
        env:
          EAS_BUILD_PLATFORM: ios
          BUNDLE_TERMUX_BOOTSTRAP: '0'
        run: bash eas-build-pre-install.sh

      - name: Publish OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ github.event.inputs.channel == 'production' && 'production' || 'preview' }}
          EXPO_PUBLIC_ELEVENLABS_AGENT_ID: ${{ secrets.ELEVENLABS_AGENT_ID }}
          EXPO_PUBLIC_LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: |
          export PATH="$HOME/.npm-global/bin:/home/runner/.npm-global/bin:$PATH"
          CHANNEL="${{ github.event.inputs.channel || 'preview' }}"
          MSG="${{ github.event.inputs.message || format('OTA {0}', github.sha) }}"
          eas update \
            --branch "$CHANNEL" \
            --message "$MSG" \
            --non-interactive
