name: EAS OTA Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'EAS update channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      message:
        description: 'Update message (optional)'
        required: false
        default: ''

jobs:
  ota:
    name: OTA → ${{ github.event.inputs.channel || 'preview' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/nastech-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Pre-install (image assets only — OTA is JS, no bootstrap)
        env:
          EAS_BUILD_PLATFORM: ios
          BUNDLE_TERMUX_BOOTSTRAP: '0'
        run: bash eas-build-pre-install.sh

      - name: Publish OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ github.event.inputs.channel == 'production' && 'production' || 'preview' }}
          EXPO_PUBLIC_ELEVENLABS_AGENT_ID: ${{ secrets.ELEVENLABS_AGENT_ID }}
          EXPO_PUBLIC_LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'preview' }}"
          MSG="${{ github.event.inputs.message || format('OTA {0}', github.sha) }}"
          eas update \
            --branch "$CHANNEL" \
            --message "$MSG" \
            --non-interactive
