name: EAS OTA Update

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'EAS update channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  ota:
    name: Publish OTA update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/nastech-app

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Publish OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ github.event.inputs.branch == 'production' && 'production' || 'preview' }}
          EXPO_PUBLIC_ELEVENLABS_AGENT_ID: ${{ secrets.ELEVENLABS_AGENT_ID }}
          EXPO_PUBLIC_LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: |
          BRANCH="${{ github.event.inputs.branch || 'preview' }}"
          eas update --branch "$BRANCH" --message "OTA: ${{ github.sha }}" --non-interactive
