# Based on: https://github.com/semantic-release/semantic-release/blob/master/.github/workflows/release.yml
name: Semantic Release

# SHIFT 5 — triggered when Release Please (Shift 4) completes on main
on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["release-please"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm clean-install
        working-directory: packages/nastech-app

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/nastech-app
