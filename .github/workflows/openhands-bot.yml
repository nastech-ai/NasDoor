name: "🙌 OpenHands Bot"

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task:
        description: "Task for OpenHands"
        required: false
        default: "Fix all CI and code errors in this repository"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  issue-triage:
    name: "OpenHands — Issue triage"
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text  = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            const isCiFailure = /copilot|workflow|action|ci|build|lint|typecheck/i.test(text);

            if (isCiFailure) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: [
                  `👋 This looks like a CI issue. OpenHands can fix it automatically!`,
                  ``,
                  `Comment \`/fix ${issue.title.slice(0, 80)}\` to trigger auto-repair.`,
                  `Or add the label \`fix-me\` to queue a fix.`,
                ].join('\n'),
              });
            }

  fix-on-command:
    name: "OpenHands — /fix command"
    if: |
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: openhands-fix-${{ github.event.issue.number }}
      cancel-in-progress: true
    env:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
    steps:
      - name: Check permissions
        id: perm
        uses: actions/github-script@v7
        with:
          script: |
            const assoc   = context.payload.comment.author_association;
            const allowed = ['OWNER','MEMBER','COLLABORATOR'].includes(assoc);
            core.setOutput('allowed', allowed ? 'true' : 'false');
            if (!allowed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: 'Only repo collaborators can trigger OpenHands fixes.',
              });
            }

      - uses: actions/checkout@v4
        if: steps.perm.outputs.allowed == 'true'
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Acknowledge command
        if: steps.perm.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const cmd = context.payload.comment.body.replace('/fix', '').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `OpenHands is working on this...`,
                `**Task:** ${cmd || 'Fix the issue described above'}`,
                `[View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ].join('\n'),
            });

      - name: Run OpenHands resolver
        if: steps.perm.outputs.allowed == 'true' && env.LLM_API_KEY != ''
        uses: all-hands-ai/OpenHands-resolver@main
        continue-on-error: true
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          llm-model: "anthropic/claude-3-5-sonnet-20241022"
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          issue-number: ${{ github.event.issue.number }}
          max-iterations: "30"

      - name: Quick-fix fallback
        if: steps.perm.outputs.allowed == 'true'
        run: |
          pip install autopep8 isort -q
          npm install -g prettier 2>/dev/null | tail -1 || true
          find packages/nastech-app/sources -name "*.ts" -o -name "*.tsx" 2>/dev/null | \
            xargs prettier --write 2>/dev/null || true
          find nastech-agent -name "*.py" 2>/dev/null | \
            xargs autopep8 --in-place 2>/dev/null || true
          isort nastech-agent/ --profile black 2>/dev/null || true
          git config user.name  "OpenHands[bot]"
          git config user.email "openhands@all-hands.dev"
          git add -A
          if ! git diff --cached --quiet; then
            BRANCH="openhands/fix-issue-${{ github.event.issue.number }}"
            git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
            git commit -m "fix(openhands): auto-repair issue #${{ github.event.issue.number }} [skip ci]"
            git push origin "$BRANCH"
            echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          fi

      - name: Create or update PR
        if: steps.perm.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH;
            if (!branch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `No auto-fixable changes found. Manual review needed.`,
              });
              return;
            }
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `fix(openhands): Auto-repair issue #${context.issue.number}`,
              head: branch, base: 'main',
              body: `Closes #${context.issue.number}\n\nApplied: Prettier, autopep8, isort.`,
            }).catch(() => null);
            if (pr) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `PR created: #${pr.data.number} — ${pr.data.html_url}`,
              });
            }

  qa-pr:
    name: "OpenHands — QA PR"
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'qa-this'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run QA checks
        continue-on-error: true
        run: |
          echo "=== QA: Python syntax ==="
          find nastech-agent -name "*.py" -exec python3 -m py_compile {} \; 2>&1 | head -10 || true
          echo "=== QA: YAML ==="
          pip install yamllint -q
          yamllint .github/workflows/ -d relaxed 2>&1 | tail -10 || true

      - name: Post QA report
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `## QA Report`,
                `Checks: Python syntax, YAML validation.`,
                `[View logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ].join('\n'),
            });

  lint-fix:
    name: "OpenHands — Lint fix"
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'lint-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Fix frontend + Python lint
        run: |
          npm install -g prettier 2>/dev/null | tail -2 || true
          pip install autopep8 isort -q
          find packages/nastech-app/sources -name "*.ts" -o -name "*.tsx" | \
            xargs prettier --write 2>/dev/null || true
          autopep8 --in-place -r nastech-agent/ 2>/dev/null || true
          isort nastech-agent/ --profile black 2>/dev/null || true

      - name: Commit lint fixes
        run: |
          git config user.name  "OpenHands[bot]"
          git config user.email "openhands@all-hands.dev"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix(openhands): auto-fix lint [skip ci]"
            git push
          else
            echo "No lint issues found"
          fi
