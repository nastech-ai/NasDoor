# OpenHands AI Bot — integrated from https://github.com/OpenHands/OpenHands
# Patterns pulled from: issue-opened.yml, qa-changes-by-openhands.yml, lint-fix.yml
# Auto-fixes issues, QAs PRs, and responds to slash commands
name: "🙌 OpenHands Bot"

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to fix"
        required: false
      task:
        description: "Task for OpenHands"
        required: false
        default: "Fix all CI and code errors in this repository"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── 1. Auto-triage new issues (from OpenHands issue-opened.yml) ──
  issue-triage:
    name: "OpenHands — Issue triage"
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue  = context.payload.issue;
            const body   = (issue.body  || '').toLowerCase();
            const title  = (issue.title || '').toLowerCase();
            const text   = title + ' ' + body;

            // Detect if this looks like a CI/copilot failure notification
            const isCiFailure = /copilot|workflow|action|ci|build|lint|typecheck/i.test(text);

            if (isCiFailure && !body.includes('/fix')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: [
                  `👋 This looks like a CI issue. **OpenHands** can fix it automatically!`,
                  ``,
                  `To trigger auto-repair, comment:`,
                  `\`\`\``,
                  `/fix ${title.slice(0,80)}`,
                  `\`\`\``,
                  ``,
                  `Or add the label \`fix-me\` to queue an OpenHands fix.`,
                  ``,
                  `> 🤖 *Powered by [OpenHands](https://github.com/OpenHands/OpenHands)*`,
                ].join('\n'),
              });
            }

  # ── 2. Fix issue on /fix comment (slash command) ──────────────
  fix-on-command:
    name: "OpenHands — /fix command"
    if: |
      github.event_name == 'issue_comment' &&
      startsWith(github.event.comment.body, '/fix')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: openhands-fix-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Check permissions
        id: perm
        uses: actions/github-script@v7
        with:
          script: |
            const assoc = context.payload.comment.author_association;
            const allowed = ['OWNER','MEMBER','COLLABORATOR'].includes(assoc);
            core.setOutput('allowed', allowed ? 'true' : 'false');
            if (!allowed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ Only repo collaborators can trigger OpenHands fixes.',
              });
            }

      - uses: actions/checkout@v4
        if: steps.perm.outputs.allowed == 'true'
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Acknowledge command
        if: steps.perm.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const cmd = context.payload.comment.body.replace('/fix','').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `🤖 **OpenHands** is working on this...`,
                ``,
                `**Task:** ${cmd || 'Fix the issue described above'}`,
                `**Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `I'll post a PR or update when done.`,
              ].join('\n'),
            });

      - name: Run OpenHands fix
        if: steps.perm.outputs.allowed == 'true' && secrets.LLM_API_KEY != ''
        uses: OpenHands/extensions/plugins/fix-issue@main
        continue-on-error: true
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          llm-model: "claude-3-5-sonnet-20241022"
          llm-api-key: ${{ secrets.LLM_API_KEY }}
          issue-number: ${{ github.event.issue.number }}
          max-iterations: "50"

      - name: Apply quick fixes + create PR if OpenHands unavailable
        if: steps.perm.outputs.allowed == 'true'
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Quick-fix fallback
        if: steps.perm.outputs.allowed == 'true'
        run: |
          npm install -g prettier 2>/dev/null | tail -1 || true
          pip install autopep8 isort yamllint -q
          find packages/nastech-app/sources -name "*.ts" -o -name "*.tsx" 2>/dev/null | \
            xargs prettier --write 2>/dev/null || true
          find nastech-agent -name "*.py" 2>/dev/null | \
            xargs autopep8 --in-place 2>/dev/null || true
          isort nastech-agent/ --profile black 2>/dev/null || true
          git config user.name  "OpenHands[bot]"
          git config user.email "openhands@all-hands.dev"
          git add -A
          if ! git diff --cached --quiet; then
            BRANCH="openhands/fix-issue-${{ github.event.issue.number }}"
            git checkout -b "$BRANCH"
            git commit -m "fix(openhands): auto-repair issue #${{ github.event.issue.number }} [skip ci]"
            git push origin "$BRANCH"
            echo "BRANCH=${BRANCH}" >> $GITHUB_ENV
          fi

      - name: Create PR for the fix
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH;
            if (!branch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ No auto-fixable changes found — the issue may require manual attention.`,
              });
              return;
            }
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `fix(openhands): Auto-repair issue #${context.issue.number}`,
              head: branch,
              base: 'main',
              body: [
                `Closes #${context.issue.number}`,
                ``,
                `## 🤖 OpenHands Auto-Fix`,
                `Applied: Prettier, autopep8, isort, YAML cleanup.`,
                ``,
                `> Auto-generated by OpenHands Bot`,
              ].join('\n'),
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **PR created:** #${pr.data.number} — ${pr.data.html_url}`,
            });

  # ── 3. QA-test a PR when qa-this label added ──────────────────
  qa-pr:
    name: "OpenHands — QA PR"
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'qa-this'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run QA checks
        run: |
          echo "=== QA Report for PR #${{ github.event.pull_request.number }} ==="
          echo ""
          echo "--- TypeScript ---"
          npm install -g pnpm@10 2>/dev/null | tail -1 || true
          pnpm install --no-frozen-lockfile 2>/dev/null | tail -3 || true
          pnpm --filter nastech-app exec tsc --noEmit 2>&1 | tail -10 || true
          echo ""
          echo "--- Python syntax ---"
          find nastech-agent -name "*.py" -exec python3 -m py_compile {} \; 2>&1 | head -10 || true
          echo ""
          echo "--- YAML ---"
          pip install yamllint -q
          yamllint .github/workflows/ -d relaxed 2>&1 | tail -10 || true
        continue-on-error: true

      - name: Post QA report
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                `## 🙌 OpenHands QA Report`,
                ``,
                `Checks run: TypeScript, Python syntax, YAML validation.`,
                ``,
                `> Full logs: [View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                ``,
                `> Powered by [OpenHands](https://github.com/OpenHands/OpenHands)`,
              ].join('\n'),
            });

  # ── 4. lint-fix label → auto-fix lint on PR ──────────────────
  lint-fix:
    name: "OpenHands — Lint fix"
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'lint-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Fix frontend lint
        run: |
          npm install -g prettier eslint 2>/dev/null | tail -2 || true
          find packages/nastech-app/sources -name "*.ts" -o -name "*.tsx" | \
            xargs prettier --write 2>/dev/null || true
          echo "✅ Frontend lint fixed"

      - name: Fix Python lint
        run: |
          pip install autopep8 isort -q
          autopep8 --in-place -r nastech-agent/ 2>/dev/null || true
          isort nastech-agent/ --profile black 2>/dev/null || true
          echo "✅ Python lint fixed"

      - name: Commit lint fixes
        run: |
          git config user.name  "OpenHands[bot]"
          git config user.email "openhands@all-hands.dev"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-fix lint issues (OpenHands) [skip ci]"
            git push
            echo "✅ Lint fixes pushed"
          else
            echo "ℹ️  No lint issues found"
          fi
