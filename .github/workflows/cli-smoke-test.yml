name: Agent Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'nastech-agent/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    paths:
      - 'nastech-agent/**'
  workflow_dispatch:

jobs:
  agent-smoke-test:
    name: Python daemon — import + gateway probe
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nastech-agent
        run: |
          cd nastech-agent
          pip install -e ".[dev]" --quiet

      - name: Smoke test — module imports
        run: |
          python3 -c "
          import nastech_cli.main
          import nastech_cli.web_server
          print('✓ Core imports OK')
          "

      - name: Smoke test — gateway startup + health
        run: |
          cd nastech-agent
          python3 -m nastech_cli.main gateway start --insecure --port 19119 &
          DAEMON_PID=$!
          echo "Daemon PID: $DAEMON_PID"

          # Wait up to 20 s for the gateway to come up
          UP=0
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:19119/api/status -o /dev/null 2>&1; then
              UP=1
              echo "✓ Gateway healthy after ${i}s"
              break
            fi
            sleep 1
          done

          kill "$DAEMON_PID" 2>/dev/null || true

          if [ "$UP" != "1" ]; then
            echo "✗ Gateway did not become healthy within 20 s"
            exit 1
          fi
