name: Agent Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'nastech-agent/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    paths:
      - 'nastech-agent/**'
  workflow_dispatch:

jobs:
  agent-smoke-test:
    name: Python daemon — install + import check
    runs-on: [self-hosted, replit]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Python version
        run: python3 --version

      - name: Install nastech-agent
        run: |
          cd nastech-agent
          python3 -m pip install -e ".[dev]" --quiet

      - name: Smoke test — CLI help
        run: python3 -m nastech_cli.main --help 2>&1 | grep -q "nastech" && echo "CLI help OK"

      - name: Smoke test — CLI version
        run: python3 -m nastech_cli.main --version 2>&1 | head -1 && echo "CLI version OK"

      - name: Smoke test — core imports
        run: |
          python3 -c "
          from nastech_cli import config, commands
          print('config imported, commands imported — OK')
          "

      - name: Smoke test — gateway
        run: |
          python3 -c "
          from nastech_cli.subcommands.gateway import build_gateway_parser
          print('gateway subcommand OK')
          "
