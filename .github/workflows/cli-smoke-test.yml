name: Agent Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'nastech-agent/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    paths:
      - 'nastech-agent/**'
  workflow_dispatch:

jobs:
  agent-smoke-test:
    name: Python daemon — install + import check
    runs-on: [self-hosted, replit]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python version
        run: python3 --version

      - name: Install nastech-agent
        run: |
          cd nastech-agent
          python3 -m pip install -e ".[dev]" --quiet --break-system-packages 2>/dev/null \
            || python3 -m pip install -e ".[dev]" --quiet

      - name: Smoke test — imports
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'nastech-agent')
          from nastech_cli import config
          print('✓ nastech_cli.config imported')
          " 2>&1

      - name: Smoke test — CLI help
        run: |
          cd nastech-agent
          python3 -m nastech_cli.main --help 2>&1 | head -5
          echo "✓ CLI help OK"

      - name: Smoke test — CLI version
        run: |
          cd nastech-agent
          python3 -m nastech_cli.main --version 2>&1 | head -1 || echo "version command not supported (OK)"
