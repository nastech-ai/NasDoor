name: "🤖 Copilot: Daemon"

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    paths:
      - "nastech-agent/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  python-syntax:
    name: "Copilot 33 - Python syntax"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check all Python files
        run: |
          ERRORS=""
          for f in $(find nastech-agent -name "*.py" 2>/dev/null); do
            python3 -m py_compile "$f" 2>/tmp/syn_err || ERRORS="$ERRORS $(cat /tmp/syn_err)"
          done
          COUNT=$(find nastech-agent -name "*.py" 2>/dev/null | wc -l)
          [ -n "$ERRORS" ] && echo "Errors:$ERRORS" && exit 1
          echo "All $COUNT Python files OK"

  requirements-audit:
    name: "Copilot 34 - Requirements"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate requirements.txt
        run: |
          if [ -f nastech-agent/requirements.txt ]; then
            cat nastech-agent/requirements.txt
            UNPINNED=$(grep -v "==" nastech-agent/requirements.txt | grep -v "^#\|^$" || true)
            [ -n "$UNPINNED" ] && echo "Unpinned: $UNPINNED" || echo "All packages pinned"
          else
            echo "No requirements.txt"
          fi

  port-check:
    name: "Copilot 35 - Port 9119"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Verify port 9119 usage
        run: |
          COUNT=$(grep -r "9119" nastech-agent/ --include="*.py" -l 2>/dev/null | wc -l)
          echo "Files referencing port 9119: $COUNT"
          grep -r "9119" nastech-agent/ --include="*.py" -l 2>/dev/null || echo "(none found)"

  api-schema:
    name: "Copilot 36 - API schema"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check API routes
        run: |
          python3 -c "
import re, os, sys
files=[]
for root,dirs,fs in os.walk('nastech-agent'):
    for f in fs:
        if any(k in f for k in ['web_server','server','api']): files.append(os.path.join(root,f))
if not files: print('No server files'); sys.exit(0)
for sf in files:
    routes=re.findall(r'@\w+\.(?:route|get|post|put|delete)\([\"\x27]([^\"\']+)[\"\x27]',open(sf).read())
    print(f'{sf}: {len(routes)} routes',routes[:5])
"

  import-check:
    name: "Copilot 37 - Python imports"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate imports
        run: |
          python3 -c "
import os,ast,sys
errors=[]
for root,dirs,files in os.walk('nastech-agent'):
    dirs[:]=[d for d in dirs if d not in ['venv','.venv','__pycache__','.git']]
    for f in files:
        if not f.endswith('.py'): continue
        path=os.path.join(root,f)
        try: ast.parse(open(path).read())
        except SyntaxError as e: errors.append(f'{path}: {e}')
if errors:
    print('Parse errors:'); [print(e) for e in errors]; sys.exit(1)
count=sum(1 for r,d,fs in os.walk('nastech-agent') for x in fs if x.endswith('.py'))
print(f'{count} Python files OK')
"

  daemon-health:
    name: "Copilot 38 - Daemon health"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and check
        run: |
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -3 || true
          fi
          python3 -c "
import os,sys
sys.path.insert(0,'nastech-agent')
py_files=[f[:-3] for f in os.listdir('nastech-agent') if f.endswith('.py') and not f.startswith('_')]
print('Found:',py_files[:10])
"

  type-hints:
    name: "Copilot 39 - mypy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run mypy
        run: |
          pip install mypy -q
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -3 || true
          fi
          mypy nastech-agent --ignore-missing-imports --no-error-summary 2>&1 | tail -15 || true

  test-coverage:
    name: "Copilot 40 - Tests"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pytest
        run: |
          pip install pytest pytest-cov -q
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -3 || true
          fi
          python3 -m pytest nastech-agent/ --tb=short -q 2>&1 | tail -15 || echo "No tests"
