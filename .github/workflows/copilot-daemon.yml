# Copilot Fleet 5 - Python Daemon (Copilots 33-40)
name: "\U0001F916 Copilot: Daemon"

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    paths:
      - "nastech-agent/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  python-syntax:
    name: "Copilot 33 - Python syntax"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check all Python files
        run: |
          ERRORS=""
          for f in $(find nastech-agent -name "*.py" 2>/dev/null); do
            python3 -m py_compile "$f" 2>/tmp/syn_err || ERRORS="$ERRORS\n$(cat /tmp/syn_err)"
          done
          if [ -n "$ERRORS" ]; then
            printf "Syntax errors:%b\n" "$ERRORS"
            exit 1
          fi
          COUNT=$(find nastech-agent -name "*.py" 2>/dev/null | wc -l)
          echo "All $COUNT Python files pass syntax check"
        continue-on-error: true

  requirements-audit:
    name: "Copilot 34 - Requirements"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate requirements.txt
        run: |
          if [ -f nastech-agent/requirements.txt ]; then
            echo "=== requirements.txt ==="
            cat nastech-agent/requirements.txt
            UNPINNED=$(grep -v "==" nastech-agent/requirements.txt | grep -v "^#\|^$" || true)
            if [ -n "$UNPINNED" ]; then
              echo "Unpinned packages: $UNPINNED"
            else
              echo "All packages pinned"
            fi
          else
            echo "No requirements.txt found"
          fi

  port-conflict:
    name: "Copilot 35 - Port 9119"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify port 9119 usage
        run: |
          python3 -c "
import os, re
ports = {}
for root, dirs, files in os.walk('nastech-agent'):
    for fname in files:
        if not fname.endswith('.py'): continue
        path = os.path.join(root, fname)
        content = open(path).read()
        for port in re.findall(r'\b(9\d{3}|8\d{3})\b', content):
            ports.setdefault(port, []).append(path)
print('Port usage:')
for port, files in sorted(ports.items()):
    print(f'  :{port} -- {set(f.split(\"/\")[-1] for f in files)}')
print('Port 9119 found' if '9119' in ports else 'Port 9119 NOT found')
"

  api-schema:
    name: "Copilot 36 - API schema"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check API routes
        run: |
          python3 -c "
import re, os, sys
server_files = []
for root, dirs, files in os.walk('nastech-agent'):
    for f in files:
        if any(k in f for k in ['web_server','server','api']):
            server_files.append(os.path.join(root, f))
if not server_files:
    print('No web_server.py found')
    sys.exit(0)
for sf in server_files:
    content = open(sf).read()
    routes = re.findall(r'@\w+\.(?:route|get|post|put|delete)\([\"\'"]([^\"\']+)[\"\']', content)
    print(f'{sf} -- {len(routes)} routes: {routes}')
"

  import-check:
    name: "Copilot 37 - Python imports"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and validate imports
        run: |
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -5 || true
          fi
          python3 -c "
import os, ast, sys
errors = []
for root, dirs, files in os.walk('nastech-agent'):
    dirs[:] = [d for d in dirs if d not in ['venv','.venv','__pycache__','.git']]
    for fname in files:
        if not fname.endswith('.py'): continue
        path = os.path.join(root, fname)
        try:
            ast.parse(open(path).read())
        except SyntaxError as e:
            errors.append(f'{path}: {e}')
if errors:
    print('Parse errors:'); [print(f'  {e}') for e in errors]; sys.exit(1)
else:
    count = sum(1 for r,d,f in os.walk('nastech-agent') for x in f if x.endswith('.py'))
    print(f'{count} Python files parsed cleanly')
"

  daemon-health:
    name: "Copilot 38 - Daemon smoke test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps and import-check
        run: |
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -3 || true
          fi
          cd nastech-agent
          python3 -c "
import importlib, os, sys
sys.path.insert(0,'.')
modules = [f[:-3] for f in os.listdir('.') if f.endswith('.py') and not f.startswith('_')]
ok=[]; fail=[]
for m in modules[:10]:
    try:
        importlib.import_module(m)
        ok.append(m)
    except Exception as e:
        fail.append(f'{m}: {str(e)[:60]}')
print(f'Imported: {ok}')
if fail: print(f'Failed: {fail}')
" 2>&1 | head -30 || true

  type-hints:
    name: "Copilot 39 - mypy types"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run mypy
        run: |
          pip install mypy -q
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -3 || true
          fi
          mypy nastech-agent --ignore-missing-imports --no-error-summary 2>&1 | tail -20 || true
        continue-on-error: true

  test-coverage:
    name: "Copilot 40 - Test coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pytest with coverage
        run: |
          pip install pytest pytest-cov -q
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -3 || true
          fi
          cd nastech-agent
          python3 -m pytest --cov=. --cov-report=term-missing --tb=short -q 2>&1 | tail -20 \
            || echo "No tests found"
        continue-on-error: true
