name: "Copilot Daemon"

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    paths:
      - "nastech-agent/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  python-syntax:
    name: "Copilot 33 - Python syntax"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Compile-check all Python files
        run: |
          COUNT=$(find nastech-agent -name "*.py" 2>/dev/null | wc -l)
          ERRORS=0
          for f in $(find nastech-agent -name "*.py" 2>/dev/null); do
            python3 -m py_compile "$f" 2>/dev/null || ERRORS=$((ERRORS+1))
          done
          echo "Files: $COUNT, Errors: $ERRORS"
          [ $ERRORS -eq 0 ] && echo "All Python files OK" || exit 1

  requirements-audit:
    name: "Copilot 34 - Requirements"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Validate requirements.txt
        run: |
          if [ -f nastech-agent/requirements.txt ]; then
            echo "Total packages: $(wc -l < nastech-agent/requirements.txt)"
            UNPINNED=$(grep -v "==" nastech-agent/requirements.txt | grep -v "^#" | grep -v "^$" || true)
            [ -n "$UNPINNED" ] && echo "Unpinned: $UNPINNED" || echo "All packages pinned"
          else
            echo "No requirements.txt"
          fi

  port-check:
    name: "Copilot 35 - Port 9119"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Verify port 9119 usage
        run: |
          COUNT=$(grep -r "9119" nastech-agent/ --include="*.py" -l 2>/dev/null | wc -l)
          echo "Files referencing port 9119: $COUNT"
          grep -r "9119" nastech-agent/ --include="*.py" -l 2>/dev/null || echo "none found"

  import-check:
    name: "Copilot 37 - Python imports"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate AST parse
        run: |
          ERRORS=0
          for f in $(find nastech-agent -name "*.py" 2>/dev/null); do
            python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null || ERRORS=$((ERRORS+1))
          done
          COUNT=$(find nastech-agent -name "*.py" 2>/dev/null | wc -l)
          echo "$COUNT files, $ERRORS errors"
          [ $ERRORS -eq 0 ] && echo "All OK" || exit 1

  daemon-health:
    name: "Copilot 38 - Daemon health"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check daemon structure
        run: |
          COUNT=$(find nastech-agent -name "*.py" | wc -l)
          echo "Python files in daemon: $COUNT"
          ls nastech-agent/*.py 2>/dev/null | head -10 || echo "No py files at root"
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -2 || true
          fi

  type-hints:
    name: "Copilot 39 - mypy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run mypy
        run: |
          pip install mypy -q 2>&1 | tail -1
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -2 || true
          fi
          mypy nastech-agent --ignore-missing-imports --no-error-summary 2>&1 | tail -10 || true

  test-coverage:
    name: "Copilot 40 - Tests"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run pytest
        run: |
          pip install pytest pytest-cov -q 2>&1 | tail -1
          if [ -f nastech-agent/requirements.txt ]; then
            pip install -r nastech-agent/requirements.txt -q 2>&1 | tail -2 || true
          fi
          python3 -m pytest nastech-agent/ --tb=short -q 2>&1 | tail -10 || echo "No tests found"
