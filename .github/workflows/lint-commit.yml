# Pulled from: https://github.com/github/super-linter/blob/main/.github/workflows/lint-commit.yaml
name: Lint Commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

jobs:
  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check single commit on PR
        if: github.event_name == 'pull_request'
        run: |
          commit_count=${{ github.event.pull_request.commits }}
          if [ -z "${commit_count}" ]; then
            echo "[ERROR] commit_count is empty"
            exit 1
          fi
          echo "PR has ${commit_count} commit(s)."

      - name: Set commit interval
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "FROM_INTERVAL=${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }}" >> "$GITHUB_ENV"
            echo "TO_INTERVAL=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install --global @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: |
          if [ -n "$FROM_INTERVAL" ]; then
            npx commitlint --from "$FROM_INTERVAL" --to "$TO_INTERVAL" --verbose || true
          else
            npx commitlint --last --verbose || true
          fi
