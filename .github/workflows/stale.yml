---
on:
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created, deleted, edited]

name: "Stale[bot]"

permissions: {}

jobs:
  markstale:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    timeout-minutes: 60
    steps:
      - name: Mark issue stale
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs. Thank you for your contributions.
            If you think this issue should stay open, please remove the `stale` label or comment on the issue.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs. Thank you for your contributions.
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,bug: confirmed"
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security"

  marknotstale:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.issue.labels.*.name, 'stale') &&
      github.event.issue.user.type != 'Bot'
    timeout-minutes: 60
    steps:
      - name: Remove stale label on activity
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'stale'
            })
